version: '3.8'
services:
  hardhat:
    image: node:18
    working_dir: /app
    command: >
      sh -c "npm install && npx hardhat node"
    ports:
      - "8545:8545"
    volumes:
      - .:/app
    environment:
      NODE_ENV: development

  graph-node:
    image: graphprotocol/graph-node
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8020:8020"
      - "8030:8030"
      - "8040:8040"
    depends_on:
      - postgres
      - ipfs
    environment:
      postgres_host: postgres
      postgres_user: graph-node
      postgres_pass: let-me-in
      postgres_db: graph-node
      ipfs: 'ipfs:5001'
      ethereum: 'mainnet:http://hardhat:8545'
      GRAPH_LOG: info

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: graph-node
      POSTGRES_PASSWORD: let-me-in
      POSTGRES_DB: graph-node

  ipfs:
    image: ipfs/go-ipfs:v0.4.23
    ports:
      - "5001:5001"
