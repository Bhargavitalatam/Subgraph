specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: WeatherOracle
    network: sepolia
    source:
      address: "0x1146c30bc4FF9d13F902d7E5C3a3fd199dF04E9f"
      abi: WeatherOracle
      startBlock: 7803790
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - WeatherReport
      abis:
        - name: WeatherOracle
          file: ../artifacts/contracts/WeatherOracle.sol/WeatherOracle.json
      eventHandlers:
        - event: WeatherReported(indexed bytes32,string,int256,string,uint256)
          handler: handleWeatherReported
      file: ./src/mappings/weather-oracle.ts
